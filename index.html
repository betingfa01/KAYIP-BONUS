<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FA01 Kayıp Bonus Hesaplayıcı</title>
<meta name="description" content="FA01 Betting Exchange için kayıp bonus tutarını hızlıca hesaplayan, çevrimdışı çalışabilen araç.">
<meta name="theme-color" content="#0f0f0f">
<meta name="color-scheme" content="dark">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FA01 Kayıp Bonus">
<meta name="application-name" content="FA01 Kayıp Bonus">
<meta name="msapplication-TileColor" content="#0f0f0f">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
*{box-sizing:border-box}
:root{
  --green:#BEF264;
  --green2:#A3E635;
  --border:#3a3a3a;
  --muted:#a3a3a3;
  --blue:#3b82f6;
}
body{
  margin:0;
  padding:14px;
  padding:max(14px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(14px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top,rgba(190,242,100,.07),transparent 30%),linear-gradient(180deg,#111,#070707);
  color:#fff;
}
.card{
  max-width:520px;
  margin:0 auto;
  background:linear-gradient(180deg,#191919,#101010);
  border:1px solid #343434;
  border-radius:22px;
  padding:18px;
  box-shadow:0 18px 45px rgba(0,0,0,.55);
}
.logo{
  display:block;
  width:100%;
  max-width:180px;
  margin:0 auto 10px;
  border-radius:12px;
}
h1{
  margin:6px 0 16px;
  text-align:center;
  font-size:29px;
  line-height:1.12;
}
h1 span{color:var(--green)}
.panel{
  border:1px solid #343434;
  border-radius:18px;
  padding:15px;
  background:rgba(255,255,255,.015);
  margin-top:10px;
}
label{
  display:block;
  margin:12px 0 7px;
  font-weight:900;
  font-size:17px;
}
.input-wrap{
  display:flex;
  align-items:center;
  border:1px solid var(--border);
  border-radius:13px;
  background:#202020;
  overflow:hidden;
}
.prefix{
  min-width:50px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--green);
  font-size:23px;
  font-weight:950;
  background:rgba(0,0,0,.18);
  border-right:1px solid #303030;
}
input{
  width:100%;
  height:54px;
  border:0;
  outline:0;
  padding:0 13px;
  font-size:22px;
  background:transparent;
  color:#fff;
}
input::placeholder{color:#777}
.input-wrap:focus-within{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(190,242,100,.12);
}
button{
  width:100%;
  margin-top:20px;
  min-height:60px;
  border:0;
  border-radius:13px;
  font-size:21px;
  font-weight:950;
  background:linear-gradient(180deg,var(--green),var(--green2));
  color:#101010;
  cursor:pointer;
}
.result{
  margin-top:18px;
  padding:18px;
  border:2px solid #3a3a3a;
  border-radius:16px;
  background:#171717;
  display:flex;
  gap:14px;
  align-items:center;
}
.result.active{
  border-color:var(--green);
  background:linear-gradient(180deg,#21300d,#151515);
}
.badge{
  min-width:58px;
  height:58px;
  border-radius:50%;
  background:rgba(190,242,100,.13);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:var(--green);
  font-weight:900;
}
.result-title{font-size:18px;font-weight:900}
.big{
  margin-top:4px;
  font-size:44px;
  font-weight:950;
  color:var(--green);
  word-break:break-word;
}
.formula{
  margin-top:6px;
  color:#bdbdbd;
  font-size:14px;
}
.footer{
  margin-top:14px;
  text-align:center;
  color:#888;
  font-size:13px;
}
.footer b{color:var(--blue)}
@media(max-width:420px){
  body{padding:10px}
  body{padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left))}
  .card{padding:14px}
  .logo{max-width:170px}
  h1{font-size:27px}
  .big{font-size:38px}
}
</style>
</head>
<body>
<noscript>
  <div style="max-width:520px;margin:40px auto;padding:18px;background:#191919;border:1px solid #343434;border-radius:16px;color:#fff;text-align:center;font-family:Arial,Helvetica,sans-serif;">
    Bu hesaplayıcının çalışması için tarayıcınızda JavaScript'in etkin olması gerekir.
  </div>
</noscript>
<main class="card">
  <img src="fa01-logo.jpg" alt="FA01 Betting Exchange" class="logo" width="1152" height="912" fetchpriority="high">
  <h1><span>KAYIP BONUS</span><br>HESAPLAYICI</h1>

  <section class="panel">
    <label for="bahis">Bahis Miktarı (€)</label>
    <div class="input-wrap"><div class="prefix">€</div><input id="bahis" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 1000"></div>

    <label for="oran">Bonus Oranı (%)</label>
    <div class="input-wrap"><div class="prefix">%</div><input id="oran" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 30"></div>

    <button type="button" id="hesaplaBtn">HESAPLA</button>

    <div id="sonucBox" class="result" role="status" aria-live="polite">
      <div class="badge" aria-hidden="true">€</div>
      <div>
        <div class="result-title">Borsaya Yatırılacak Tutar (€)</div>
        <div id="sonuc" class="big">0.00 €</div>
        <div class="formula">Formül: Bahis Tutarı − Bonusun Yarısı</div>
      </div>
    </div>
  </section>

  <div class="footer"><b>FA01</b> BETTING EXCHANGE</div>
</main>
<script>
(function () {
  'use strict';

  function parseNumber(id) {
    var el = document.getElementById(id);
    if (!el) return 0;
    var raw = String(el.value).replace(',', '.');
    var n = parseFloat(raw);
    return isNaN(n) ? 0 : n;
  }

  function hesapla() {
    try {
      var bahis = parseNumber('bahis');
      var oran = parseNumber('oran');
      var bonus = (bahis * oran) / 100;
      var yariBonus = bonus / 2;
      var yatirilacak = bahis - yariBonus;

      var sonucEl = document.getElementById('sonuc');
      var boxEl = document.getElementById('sonucBox');
      if (sonucEl) sonucEl.textContent = yatirilacak.toFixed(2) + ' €';
      if (boxEl) boxEl.classList.add('active');
    } catch (err) {
      if (window.console && console.error) console.error('FA01 hesaplama hatası:', err);
    }
  }

  function handleEnterKey(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      hesapla();
    }
  }

  function init() {
    var btn = document.getElementById('hesaplaBtn');
    if (btn) btn.addEventListener('click', hesapla);

    var bahisEl = document.getElementById('bahis');
    var oranEl = document.getElementById('oran');
    if (bahisEl) bahisEl.addEventListener('keydown', handleEnterKey);
    if (oranEl) oranEl.addEventListener('keydown', handleEnterKey);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function (err) {
        if (window.console && console.warn) console.warn('Service worker kaydı başarısız (uygulama çevrimiçi olarak çalışmaya devam eder):', err);
      });
    });
  }
})();
</script>
</body>
</html>
